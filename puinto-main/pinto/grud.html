        momes.push(nome);
        document.getElementById("nome").value = "";

        }    
        }
        function mostrar(){
        let texto = "Nomes cadastrado: <br>"
        for(let i=o;  i<nomes. length; i++){
        texto += nome[i] + "<br>";

        document.getElementById("resultado").innerHTML = texto;

        }

</body>
